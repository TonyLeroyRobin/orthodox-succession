<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bishop profile — Orthodox Apostolic Succession</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<p><a href="index.html" data-i18n="person.back">&larr; timelines</a> · <a href="graph.html" data-i18n="person.graphLink">consecration graph</a></p>
<div id="error"></div>
<div id="profile"></div>
<footer data-i18n="person.footer"></footer>

<script src="app.js"></script>
<script>
(async function () {
  await initLocale();
  const id = new URLSearchParams(location.search).get("id");
  let D;
  try {
    D = await loadData(["people", "sees", "tenures", "consecrations",
                        "participations", "events", "works", "sources"]);
  } catch (e) {
    document.getElementById("error").innerHTML =
      `<p class="error">${t("error.load", { msg: esc(e.message) })}</p>`;
    return;
  }
  const people = byId(D.people), seesMap = byId(D.sees),
        eventsMap = byId(D.events), sources = byId(D.sources);
  const p = people.get(id);
  if (!p) {
    document.getElementById("error").innerHTML =
      `<p class="error">${t("person.error.noSuch", { id: esc(id) })}</p>`;
    return;
  }
  document.title = personName(p) + t("site.titleSuffix");

  const n = p.names || {};
  const native = (n.native || []).map((x) => esc(x.value)).join(", ");
  const variants = (n.variants || []).map(esc).join("; ");

  let html = `<h1>${esc(personName(p))} ${statusBadge(p.status)}${corroborationBadge(p)}</h1>`;
  html += `<p class="subtitle">${esc(p.id)} · ${t("person.attestation")} <strong>${esc(p.attestation)}</strong></p>`;

  html += `<div class="panel"><h2>${t("person.identity.h2")}</h2><table><tbody>`;
  if (n.baptismal) html += `<tr><th>${t("person.identity.baptismal")}</th><td>${esc(n.baptismal)}</td></tr>`;
  if (n.family) html += `<tr><th>${t("person.identity.family")}</th><td>${esc(n.family)}</td></tr>`;
  if (native) html += `<tr><th>${t("person.identity.native")}</th><td>${native}</td></tr>`;
  if (variants) html += `<tr><th>${t("person.identity.variants")}</th><td>${variants}</td></tr>`;
  if (p.born) html += `<tr><th>${t("person.identity.born")}</th><td>${esc(fmtDate((p.born || {}).date))}${p.born.place ? " — " + esc(p.born.place) : ""}</td></tr>`;
  if (p.died) html += `<tr><th>${t("person.identity.died")}</th><td>${esc(fmtDate((p.died || {}).date))}${p.died.place ? " — " + esc(p.died.place) : ""}</td></tr>`;
  html += `</tbody></table>
    ${citationsHtml(p.sources, sources)}
    ${p.notes ? `<p class="note">${esc(p.notes)}</p>` : ""}</div>`;

  /* ---- see-succession: tenures ---- */
  const myTenures = D.tenures.filter((t) => t.person === id);
  html += `<div class="panel"><h2>${t("person.sees.h2")} <span class="badge model">${t("person.model.see")}</span></h2>`;
  if (myTenures.length) {
    html += `<table><thead><tr><th>${t("th.see")}</th><th>${t("th.tenure")}</th><th>${t("th.end")}</th><th>${t("th.recognition")}</th><th>${t("th.status")}</th></tr></thead><tbody>`;
    for (const t of myTenures) {
      const see = seesMap.get(t.see);
      const rec = (t.recognition || [])
        .map((r) => `${esc(r.by)}: ${esc(r.status)}`).join("; ") || "—";
      html += `<tr><td>${esc(see ? see.name : t.see)}</td>
        <td>${esc(fmtRange(t.from, t.to, window.t("fmt.endUnrecordedOrIncumbent")))}</td>
        <td>${esc(t.end_reason)}</td><td>${rec}</td><td>${statusBadge(t.status)}${corroborationBadge(t)}</td></tr>
        <tr><td colspan="5">${citationsHtml(t.sources, sources)}
        ${t.notes ? `<div class="note">${esc(t.notes)}</div>` : ""}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="note">${t("person.sees.none")}</p>`;
  }
  html += `</div>`;

  /* ---- consecration-succession ---- */
  const received = D.consecrations.filter((c) => c.consecrated === id);
  const given = D.consecrations.filter((c) =>
    c.principal_consecrator === id || (c.co_consecrators || []).includes(id));
  html += `<div class="panel"><h2>${t("person.consecration.h2")} <span class="badge model">${t("person.model.consecration")}</span></h2>`;
  if (received.length) {
    for (const c of received) {
      const pc = c.principal_consecrator ? personLink(people.get(c.principal_consecrator)) : `<em>${t("person.consecration.notRecorded")}</em>`;
      const cos = (c.co_consecrators || []).map((x) => personLink(people.get(x))).join(", ") ||
                  `<em>${t("person.consecration.notYetRecorded")}</em>`;
      html += `<table><tbody>
        <tr><th>${t("person.consecration.date")}</th><td>${esc(fmtDate(c.date))}${c.place ? " — " + esc(c.place) : ""}</td></tr>
        <tr><th>${t("person.consecration.principal")}</th><td>${pc}</td></tr>
        <tr><th>${t("person.consecration.co")}</th><td>${cos}</td></tr>
        <tr><th>${t("person.consecration.status")}</th><td>${statusBadge(c.status)}</td></tr>
        </tbody></table>
        ${citationsHtml(c.sources, sources)}
        ${c.notes ? `<p class="note">${esc(c.notes)}</p>` : ""}`;
    }
  } else {
    html += `<p><em>${t("person.consecration.none")}</em></p>`;
  }
  if (given.length) {
    html += `<h3>${t("person.consecration.performed.h3")}</h3><ul>`;
    for (const c of given) {
      const role = c.principal_consecrator === id ? "principal" : "co-consecrator";
      html += `<li>${personLink(people.get(c.consecrated))} — ${esc(fmtDate(c.date))} (${role}) ${statusBadge(c.status)}</li>`;
    }
    html += `</ul>`;
  }
  html += `</div>`;

  /* ---- councils ---- */
  const myParts = D.participations.filter((x) => x.person === id);
  if (myParts.length) {
    html += `<div class="panel"><h2>${t("person.councils.h2")}</h2><table>
      <thead><tr><th>${t("th.council")}</th><th>${t("th.date")}</th><th>${t("th.role")}</th><th>${t("th.status")}</th><th>${t("th.sources")}</th></tr></thead><tbody>`;
    for (const pt of myParts) {
      const ev = eventsMap.get(pt.event);
      html += `<tr><td>${esc(ev ? ev.title : pt.event)}</td>
        <td>${esc(ev ? fmtDate((ev.date || {}).from) : "—")}</td>
        <td>${esc(pt.role)}</td><td>${statusBadge(pt.status)}</td>
        <td>${citationsHtml(pt.sources, sources)}</td></tr>`;
    }
    html += `</tbody></table></div>`;
  }

  /* ---- works ---- */
  const myWorks = D.works.filter((w) =>
    w.author === id || (w.subject_of || []).includes(id));
  if (myWorks.length) {
    html += `<div class="panel"><h2>${t("person.works.h2")}</h2>`;
    for (const w of myWorks) {
      html += `<h3>${esc(w.title)} ${statusBadge(w.status)}</h3>
        <p class="note">${t("person.works.meta", { relation: esc(w.relation), genre: esc(w.genre), attribution: esc(w.attribution) })}${w.cpg ? " · " + esc(w.cpg) : ""} ·
        ${esc(fmtDate(w.date))}</p>`;
      const eds = w.editions || [];
      if (eds.length) {
        html += `<table><thead><tr><th>${t("th.edition")}</th><th>${t("th.language")}</th><th>${t("th.seriesLocator")}</th><th>${t("th.rights")}</th><th>${t("th.read")}</th></tr></thead><tbody>`;
        for (const ed of eds) {
          html += `<tr><td>${esc(ed.type)}${ed.translator ? " — tr. " + esc(ed.translator) : ""}${ed.year ? " (" + ed.year + ")" : ""}</td>
            <td>${esc(ed.language)}</td>
            <td>${esc([ed.series, ed.locator].filter(Boolean).join(" — "))}</td>
            <td>${esc(ed.rights)}</td>
            <td>${ed.url ? `<a href="${esc(ed.url)}">${t("person.works.read")}</a>` : "—"}</td></tr>`;
        }
        html += `</tbody></table>`;
      }
      html += citationsHtml(w.sources, sources);
    }
    html += `</div>`;
  }

  document.getElementById("profile").innerHTML = html;

  /* schema.org structured data (ROADMAP C3) */
  injectJsonLd(jsonLdForPerson(p, myTenures, seesMap));
})();
</script>
</body>
</html>
