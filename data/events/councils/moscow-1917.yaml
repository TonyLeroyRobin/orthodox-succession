id: event/council/moscow-1917
type: council-local
title: All-Russian Church Council (Moscow, 1917-1918)
date:
  from:
    value: '1917-08'
    calendar: julian
    precision: month
  to:
    value: '1918-09'
    calendar: julian
    precision: month
place: Moscow
outcomes:
- Restored the Moscow patriarchate after the synodal period and elected Tikhon (Bellavin) patriarch by lot among three candidates.
- Reorganized church governance (parish statute, diocesan administration) before the Bolshevik state cut its work short.
canonical_reception: received-locally
reception_note: Its restoration of the patriarchate is universally operative fact; its statutes remain the reference point of Russian church governance debates.
