outcomes:
- Adopted the Chalcedonian definition of the two natures of Christ.
- Deposed Dioscorus of Alexandria.
- Canon 28 confirmed the prerogatives of Constantinople as New Rome.
- Settled the patriarchal jurisdiction of Jerusalem.
