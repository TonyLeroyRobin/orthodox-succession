- ref: source/synaxarion-of-constantinople
  reliability: tradition
  locator: Jan. 21 / Aug. 13 notices - locator to be confirmed
  note: the Relatio Motionis and the hagiographic dossier carry the trial narrative
status: unverified
notes: An imperial-synodal tribunal rather than a doctrinal council - cataloged as a
  synod so the charter-required participation chain (trial, then vindication at
  Constantinople III) has its event; logged and closed in docs/COUNCIL_LEADS.md.
  A first trial in 655 preceded it. Created in P3 tier v (Byzantine synthesis) 2026-07-15.
