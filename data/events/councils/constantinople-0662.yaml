id: event/council/constantinople-0662
type: synod
title: Trial synod of Maximus the Confessor, Constantinople
date:
  from:
    value: '0662'
    calendar: julian
    precision: year
place: Constantinople
outcomes:
- Condemned Maximus, his disciple Anastasius, and Anastasius the Apocrisiarius for
  refusing the monothelite Typos; sentenced to mutilation and Lazican exile.
canonical_reception: condemned
reception_note: The dyothelite doctrine Maximus suffered for was defined as orthodox
  by Constantinople III (680-681), which anathematized the monothelite leadership;
  the 662 proceedings stand condemned by that reception.
sources:
