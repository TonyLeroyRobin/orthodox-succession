id: event/council/ancyra-0314
type: council-local
title: Council of Ancyra
date:
  from:
    value: '0314'
    calendar: julian
    precision: year
place: Ancyra, Galatia
outcomes:
- Issued canons (traditionally 25) on the reconciliation of the lapsed after the persecution of Maximinus.
- Regulated clerical discipline, including canon 10 on deacons marrying after ordination.
canonical_reception: received-universally
reception_note: Canons received via Quinisext canon 2 into the universal corpus.
