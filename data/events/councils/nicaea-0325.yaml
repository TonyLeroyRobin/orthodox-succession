place: Nicaea, Bithynia
outcomes:
- Adopted the Nicene Creed and condemned Arius.
- Canon 6 confirmed the customary jurisdictions of Alexandria, Rome, and Antioch.
- Canon 7 accorded honor to the see of Aelia (Jerusalem).
- Fixed a common reckoning of Pascha.
