outcomes:
- Ratified, with reservations later revisited, the elevation of the see of Moscow to patriarchal rank performed by Jeremias II in Moscow in 1589.
- Assigned Moscow the fifth place among the patriarchates.
canonical_reception: received-universally
reception_note: Administratively operative church-wide - the pentarchy's admission of a fifth patriarchate; Alexandria's absence from the 1590 signatures is why 1593 re-confirmed the act.
