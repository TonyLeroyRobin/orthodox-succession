id: event/council/carthage-0419
type: council-local
title: Council of Carthage (419)
date:
  from:
    value: '0419-05'
    calendar: julian
    precision: month
place: Carthage
outcomes:
- Compiled and ratified the African canonical corpus (the Codex Canonum Ecclesiae Africanae, 133 canons received in the East as the canons of Carthage).
- Contested, against Rome, the appeal canons cited as Nicene (actually Sardican) in the case of the presbyter Apiarius.
canonical_reception: received-universally
reception_note: The African corpus is received via Quinisext canon 2 as the canons of Carthage; this 419 plenary is its fixing point, absorbing the series of African councils under Aurelius.
