title: Synod of Constantinople (1166)
date:
  from:
    value: '1166'
    calendar: julian
    precision: year
place: Constantinople
outcomes:
- Ruled on the interpretation of My Father is greater than I (John 14:28) against Demetrios of Lampe, under the emperor Manuel I Komnenos.
- Its definitions were engraved on marble slabs displayed in Hagia Sophia; anathemas entered the Synodikon.
canonical_reception: received-locally
reception_note: Synodikon reception; the engraved edicts survive in part.
