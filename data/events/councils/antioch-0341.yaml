id: event/council/antioch-0341
type: council-local
title: Council of Antioch (the Dedication Council)
date:
  from:
    value: '0341'
    calendar: julian
    precision: year
place: Antioch (dedication of the Golden Church)
outcomes:
- Issued 25 disciplinary canons, including canon 5 on schismatic clergy and canons on episcopal translation and appeals.
- Its dogmatic sessions produced creeds bypassing the Nicene homoousios (the Dedication creeds).
canonical_reception: received-universally
reception_note: The 25 canons are received via Quinisext canon 2 even though the council's dogmatic activity, in the Arian controversy's context, was not - reception distinguishes the canons from the creeds.
