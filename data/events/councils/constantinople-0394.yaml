    value: '0394-09'
    calendar: julian
    precision: month
place: Constantinople
outcomes:
- Ruled, in the case of the see of Bostra, that a bishop may not be deposed by two or three bishops but only by a synod of the province.
canonical_reception: received-universally
reception_note: Received in the canonical corpus (its ruling circulates among the received canons); notable for gathering Nectarius of Constantinople, Theophilus of Alexandria, and Flavian of Antioch in one session.
