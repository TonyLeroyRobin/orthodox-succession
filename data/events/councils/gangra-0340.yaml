id: event/council/gangra-0340
type: council-local
title: Council of Gangra
date:
  from:
    value: '0340'
    calendar: julian
    precision: year
place: Gangra, Paphlagonia
outcomes:
- Condemned the exaggerated asceticism associated with Eustathius of Sebaste (rejection of marriage, of meat, of church assemblies).
- Issued 20 canons with a concluding epilogue on honorable asceticism.
canonical_reception: received-universally
reception_note: Canons received via Quinisext canon 2; the council's date is debated across c. 340-355.
