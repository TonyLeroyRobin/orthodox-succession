id: event/council/ephesus-0449
type: council-local
title: Second Council of Ephesus (the Latrocinium)
date:
  from:
    value: '0449-08'
    calendar: julian
    precision: month
place: Ephesus
outcomes:
- Rehabilitated Eutyches and deposed Flavian of Constantinople, Theodoret of Cyrrhus, and others.
- Refused the reading of Leo's Tome.
canonical_reception: condemned
reception_note: Annulled at Chalcedon 451; Leo of Rome's label latrocinium (robber council) became its standing name in Chalcedonian tradition.
