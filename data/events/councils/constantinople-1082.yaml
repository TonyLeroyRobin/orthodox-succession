outcomes:
- Condemned eleven propositions of the philosopher John Italos (metempsychosis, eternity of matter, pagan rationalism in theology).
- The anathemas were entered in the Synodikon of Orthodoxy.
canonical_reception: received-locally
reception_note: The Italos anathemas are read each Sunday of Orthodoxy in the Synodikon - liturgical reception broader than the synod's local standing.
