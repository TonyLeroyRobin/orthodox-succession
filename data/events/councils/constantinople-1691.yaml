outcomes:
- Affirmed, against the logothete John Karyophylles, the term metousiosis (transubstantiation) as an Orthodox expression of the eucharistic change.
canonical_reception: received-locally
reception_note: Its definition was received into Russian synodal teaching as well (cited in the 1690s Moscow decisions on the Eucharist); the terminology debate it settled resurfaces in modern Orthodox dogmatics.
