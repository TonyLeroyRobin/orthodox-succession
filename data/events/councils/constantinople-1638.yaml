  reliability: primary
  locator: volume:column to be confirmed
  note: primary acts in a scholarly compilation
status: unverified
notes: Loukaris' own authorship of the 1629 Confession remains disputed in scholarship. Created in Milestone R5 (council catalog) 2026-07-15.
