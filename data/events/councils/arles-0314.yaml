id: event/council/arles-0314
type: council-local
title: Council of Arles
date:
  from:
    value: '0314'
    calendar: julian
    precision: year
place: Arelate (Arles), Gaul
outcomes:
- Heard the Donatist appeal against Caecilian of Carthage on Constantine's summons
  and ruled against the Donatist party.
- Issued canons on rebaptism, clerical discipline, and the Paschal date.
canonical_reception: received-locally
reception_note: A Western council of enduring canonical authority in the Latin
  tradition; its Donatist ruling framed the century of schism Augustine inherited.
