id: event/council/ferrara-florence-1438
type: council-local
title: Council of Ferrara-Florence (1438-1439)
date:
  from:
    value: '1438-04'
    calendar: julian
    precision: month
  to:
    value: '1439-07'
    calendar: julian
    precision: month
place: Ferrara, then Florence
outcomes:
- Negotiated and proclaimed a union of the Greek and Latin churches (the decree Laetentur caeli, 6 July 1439) accepting the Filioque, purgatory, and Roman primacy definitions.
- Mark of Ephesus alone among the Greek metropolitans refused to sign; the union was repudiated across the East after the delegation's return.
canonical_reception: condemned
reception_note: Counted by Rome as ecumenical; Orthodoxy rejects the union - repudiated in practice immediately, formally by the 1484 council of the four patriarchates. Recorded, not adjudicated.
