id: event/council/sardica-0343
type: council-local
title: Council of Sardica
date:
  from:
    value: '0343'
    calendar: julian
    precision: year
place: Sardica (Serdica, modern Sofia)
outcomes:
- Vindicated Athanasius of Alexandria and other Nicenes deposed by the Eusebian party.
- Issued canons including canons 3-5 on appeal procedure to the bishop of Rome.
- The Eastern bishops withdrew to Philippopolis and held a rival assembly.
canonical_reception: received-universally
reception_note: Canons received via Quinisext canon 2; the council's date is given as 343 (formerly 347). Its appeal canons were later cited at Carthage under the name of Nicaea, a confusion the African corpus itself documents.
