outcomes:
- Condemned the teaching of Soterichos Panteugenos that the eucharistic sacrifice is offered to the Father only, affirming that Christ is both offerer and offered, and the sacrifice is to the whole Trinity.
- Anathemas entered the Synodikon of Orthodoxy.
