place: Constantinople
outcomes:
- Revised, at Manuel I Komnenos' insistence, the abjuration formula for converts from Islam so that the anathema falls on Muhammad's doctrine rather than on the God of Muhammad.
canonical_reception: historical-only
reception_note: A catechetical-formula ruling preserved in the abjuration rites; cited in modern scholarship on Byzantine views of Islam more than in canonical collections.
