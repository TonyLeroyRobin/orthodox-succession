place: Iasi, Moldavia (church of the Three Hierarchs)
outcomes:
- Reviewed and corrected Peter Mohyla's Orthodox Confession, removing Latinizing articles (purgatory, the moment of consecration).
- Condemned the Calvinist articles circulated under Cyril Loukaris' name.
canonical_reception: received-universally
reception_note: The corrected Confession was ratified by the four Eastern patriarchs (1643) and circulated church-wide among the symbolic books; like Jerusalem 1672 its authority is high but qualified in modern Orthodox assessment.
