id: event/council/jerusalem-1672
type: council-local
title: Synod of Jerusalem (1672, Dositheus)
date:
  from:
    value: '1672-03'
    calendar: julian
    precision: month
place: Jerusalem (church of the Holy Sepulchre; sessions at Bethlehem)
outcomes:
- Adopted the Confession of Dositheus, rejecting the Calvinist articles circulated under the name of Cyril Loukaris.
- Affirmed the Orthodox doctrine of the Eucharist, the number of the mysteries, and the canonical books including the anaginoskomena.
canonical_reception: received-universally
reception_note: Treated with near-ecumenical authority among the symbolic books of Orthodoxy; particular articles (e.g. on lay Scripture reading) were qualified in later Orthodox use, and the 1723 reply of the Eastern Patriarchs to the Non-Jurors transmitted its Confession.
sources:
