notes: The traditional enumeration counts Peter as the first occupant of the Roman
  see; the earliest succession list (Irenaeus, Adv. Haer. III.3) treats Peter and
  Paul as founders and begins the episcopal succession with Linus. Both readings
  are recorded — here and on Linus's tenure — and neither is adjudicated. Tradition-grade
  only; permanently ineligible for verified status unless a better source emerges.
