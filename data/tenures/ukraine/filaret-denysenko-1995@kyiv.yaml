notes: 'Created in the OCU-predecessors batch 2026-07-15. Third UOC-KP patriarch (1995-2018).
  The full arc is recorded, adjudicated nowhere: canonical Metropolitan of Kyiv under Moscow
  1966-1992 (that line is unmodeled — backlogged), deposed by Moscow (1992) and anathematized
  (1997); the 11 October 2018 EP act lifted the anathema and received him; honorary patriarch
  within the OCU from December 2018; broke with the OCU in June 2019 attempting a UOC-KP revival
  — his subsequent status is contested between the OCU and his circle and is left to a future
  sourced pass. The overlaps with the other claims on this see (each other, and the Moscow-jurisdiction
  line) are the recorded dispute itself — golden rule 6.'
