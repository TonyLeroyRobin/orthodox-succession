notes: Created from the standard chronology during Milestone C reconciliation 2026-07-11.
  Primate at the 1924 tomos of autocephaly. Forced from office in 1948 amid the state- and
  Moscow-aligned reorganization (the 1948 Moscow grant, cf. the jurisdiction record) — recorded,
  not adjudicated. The 1948-1951 gap that follows is a locum tenens interval (Tymoteusz Szretter),
  list-inherent, not missing data.
