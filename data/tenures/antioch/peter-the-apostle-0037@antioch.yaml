notes: >-
  The traditional Antiochene enumeration counts Peter as first bishop
  before his departure for Rome (hence end_reason translated — his Roman
  tenure, tenure/pre-schism-rome/peter-0042@rome, follows by tradition).
  One person record holds both traditional tenures; the two-see overlap of
  traditional dates (Antioch to c. 53, Rome from c. 42) is a known feature
  of the two traditions, recorded as given. Tradition-grade only —
  permanently ineligible for verified status unless a better source
  emerges.
