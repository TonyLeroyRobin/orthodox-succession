notes: 'Created from the standard chronology (Moscow metropolitans batch, v0.2.0 cycle) 2026-07-15.
  Diocesan metropolitan of Moscow during the Synodal period — NOT a primatial tenure: the
  church was governed by the Most Holy Synod (see event/context/synodal-period-1721); the
  patriarchal throne stayed vacant 1721-1917. Translated to St Petersburg (1912), then Kyiv
  (1915), where he was martyred (1918) — the Kyiv-era modeling is future work; earlier exarch
  of Georgia (1892-1898, that line backlogged). Glorified 1992.'
