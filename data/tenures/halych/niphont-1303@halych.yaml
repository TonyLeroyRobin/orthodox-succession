notes: Created from the parallel-columns batch (Halych/Lithuania) 2026-07-15. First metropolitan
  of the Halych erection (c. 1303, for the Galician princes). The intervals between the Halych
  rows (1305-1326, 1329-1337, 1347-1370) are re-absorptions into the Kyiv metropolitanate
  — documented, not missing data. Peter (the later St Peter of Moscow) was proposed for Halych
  but made metropolitan of Kyiv instead (1308) — cf. person/ukraine/peter-1308.
