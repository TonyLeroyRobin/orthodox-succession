notes: 'Seat of the Archbishop of Prešov and Slovakia. Created in Milestone C (2026-07-11)
  — the refinement the Prague see note anticipated: the primacy of the Orthodox Church of
  the Czech Lands and Slovakia alternates by statute between the archbishops of Prague and
  of Prešov, so primatial tenures live on the see each primate actually occupied (Nikolaj
  Kocvár 2000-2006, Rastislav Gont 2014-present here). Occupancy gaps on this record reflect
  the alternation, not missing data; the non-primatial occupants of both sees are backlogged.
  jurisdiction_history and rank_history to be added during verification.'
