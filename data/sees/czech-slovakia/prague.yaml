notes: 'Seat of the Archbishop of Prague. Milestone C (2026-07-11) applied the refinement
  the earlier note anticipated: the primacy alternates by statute between Prague and Prešov
  (see/czech-slovakia/presov created), and primatial tenures live on the see each primate
  actually occupied — Jelevferij Voroncov (1946–1955), Jan Kuchtin (1956–1964), Dorotej Filip
  (1964–1999), and Kryštof Pulec (2006–2013) here; Nikolaj Kocvár and Rastislav Gont at Prešov.
  Occupancy gaps on this record reflect the alternation and the 2013–2014 locum interval,
  not missing data. Pre-1946 Czech Orthodoxy (Bishop Gorazd Pavlík under the Serbian jurisdiction,
  executed 1942, New-Martyr) is backlogged. jurisdiction_history, rank_history, and founding
  data still to be added during verification. Gorazd batch (2026-07-15): the pre-autocephaly
  anchor is modeled - Hieromartyr Gorazd Pavlik (1921-1942, under the Serbian jurisdiction,
  executed 1942, with his Belgrade consecration record); the 1942-1946 gap is the Nazi suppression
  (see event/context/nazi-suppression-czech-orthodoxy-1942).'
