notes: 'Seat of the Archbishop of Athens and All Greece. Milestone C (2026-07-11) closed the
  spine of the autocephalous Church of Greece on this see: Neophytos V (1833) to Ieronymos
  II (incumbent), 24 chronology rows carried as 23 tenures (Chrysostomos I''s split at the
  31 December 1923 metropolitan-to-archbishop restyling is carried as one tenure with a note).
  Out of scope and backlogged: the ancient bishops/metropolitans of Athens (to 1827) and the
  two EP-era metropolitans of the revolution period (Gregory IV 1827–1828, Anthimus VII 1828–1833).
  The 20th-century turbulence (the National Schism removals of Theoklitos I and Meletios III,
  the annulled 1938 election of Damaskinos, the occupation-era removal of Chrysanthos, the
  junta-era removal of Chrysostomos II) is recorded with end_reason values and notes, not
  adjudicated. jurisdiction_history, rank_history, and founding data still to be added during
  verification. Athens pre-1833 batch (2026-07-15): the ancient line is closed on this record
  - Hierotheos/Dionysius the Areopagite (1st c., tradition-graded) through Anthimus VII (July
  1833, meeting Neophytos V exactly); 105 tenures added. The Frankish era (1204-1456) is carried
  by exile/titular metropolitans with event/context/frankish-athens-1204, not a bare gap;
  the ancient attestation-sparse stretches and the 1823-1827 war vacancy are documented. Both
  first-bishop reckonings (Eusebius: Dionysius; the liturgical tradition: Hierotheos first)
  are recorded as apostolic_founders with honest grading - not adjudicated.'
