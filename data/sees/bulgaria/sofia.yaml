notes: 'Seat of the Patriarch of All Bulgaria. Milestone C (2026-07-11) closed the
  modern succession on this see: exarchs Antim I (1872), Yosif I, and Stefan I (to
  1948), then the restored patriarchate from Kiril (1953) to Daniil (2024–). The exarchal
  seat was at Constantinople (Ortaköy) 1872–1913 and moved to Sofia in 1913 — the
  moving-seat precedent. The 1915–1945 and 1948–1953 occupancy gaps are documented
  locum-tenens vacancies, list-inherent, not missing data; the 1872–1945 exarch tenures
  carry per-recognizer recognition qualifiers for the schism declared by Constantinople
  in 1872. The medieval lines live on see/bulgaria/preslav and see/bulgaria/tarnovo
  (historical jurisdictions). jurisdiction_history and rank_history still to be added
  during verification.'
