notes: 'Primatial see of the first Bulgarian patriarchate (jurisdiction/preslav-patriarchate),
  carrying the single spine 870–1018 per the moving-seat precedent: Pliska (870–893), Preslav
  (893–972), then the westward seats after the fall of Preslav (Dorostol/Sredets/Voden/Prespa/Ohrid,
  972–1018). Occupancy gaps reflect attestation-only records in the official list (Boril''s
  Synodikon names without dates), not missing data. Created in Milestone C (2026-07-11), architecture
  approved by the maintainer.'
