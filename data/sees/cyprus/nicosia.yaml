notes: >-
  Seat of the Archbishop of Nea Justiniana and All Cyprus in the modern
  period, continuing the archiepiscopal line of Salamis/Constantia
  (founded_from). During the Latin period (1191-1571) the Orthodox hierarchy
  of the island was reduced and displaced (Bulla Cypria, 1260); details of
  that period belong to later milestones. No founded date is asserted yet —
  century-precision jurisdiction/rank entries only. Milestone C audit
  (2026-07-11, audit-only per DATA_COMPLETION §3): the pilot records passed —
  citations pinned, gradings honest, two draft errors already caught in the
  2026-07-08 verification pass. Coverage is explicitly partial: the modern
  run is continuous from Makarios II (December 1947) to the incumbent
  Georgios III; everything 431–1947 on the archiepiscopal line is a known,
  deliberate gap (first missing occupant adjacent to the covered run:
  Leontios, June–July 1947), backlogged for a full-list closure pass. The
  main official site blocks automated access and web.archive.org is not
  fetchable from the audit environment — the 2026-02/03 pinned snapshots
  from the earlier pass remain the citations of record.
