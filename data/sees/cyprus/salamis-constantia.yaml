id: see/cyprus/salamis-constantia
name: "Salamis (Constantia)"
jurisdiction_history:
  - jurisdiction: jurisdiction/church-of-cyprus
    from:
      value: "0431"
      calendar: julian
      precision: year
      note: >-
        From the confirmation of Cypriot autocephaly at Ephesus. Before 431
        Antioch claimed jurisdiction over Cyprus; the claim was rejected by
        the council and is recorded here rather than modeled as a tenure of
        jurisdiction.
rank_history:
  - rank: metropolis
    from:
      value: "0431"
      calendar: julian
      precision: circa
      note: "attested as the metropolitan see of the island by the fifth century"
founded:
  date:
    value: "0045"
    calendar: julian
    precision: circa
    note: >-
      Apostolic-era origin by tradition; the date is the approximate time of
      the mission of Barnabas and Paul (Acts 13).
location:
  lat: 35.1833
  lon: 33.9
  modern_place: "ruins of Salamis, near Famagusta (Ammochostos), Cyprus"
apostolic_founder:
  person: person/cyprus/barnabas-0045
  sources:
    - ref: source/acts-of-the-apostles
      locator: "Acts 13:1-12"
      reliability: primary
      note: >-
        Primary for the mission presence of Barnabas in Cyprus; his status as
        founder-bishop of Salamis is later tradition.
    - ref: source/eusebius-ecclesiastical-history
      locator: "HE 2.3 (Barnabas among the Seventy)"
      reliability: tradition
sources:
  - ref: source/le-quien-oriens-christianus-v2
    locator: "vol. 2, s.v. Salamis/Constantia (columns to be confirmed)"
    reliability: scholarly
  - ref: source/fedalto-hierarchia-ecclesiastica-orientalis
    reliability: scholarly
status: verified
notes: >-
  Rebuilt as Constantia in the fourth century; styled Nea Justiniana after
  the temporary resettlement of the Cypriots under Justinian II (c. 691).
  The archiepiscopal line continued through the medieval upheavals and its
  seat settled at Nicosia; see see/cyprus/nicosia. The founded date is a
  tradition-grade approximation; no founded_from is recorded (apostolic
  foundation claim, no mother see).
