notes: Seat of the Serbian Patriarch since the 1920 restoration; the historical
  seat is Pec (the patriarch is still styled Archbishop of Pec, Metropolitan
  of Belgrade-Karlovci). Milestone C (2026-07-10) closed the single spine
  Sava (1219) to Porfirije on this see record per maintainer decision — the
  Constantinople precedent for a line whose seat moved (Zica, Pec, Belgrade).
  The occupancy gaps are historical, not missing data - the 1463-1557
  suppression under Ohrid (see event/context/suppression-of-pec-1463) and
  the 1766-1879 abolition under Constantinople (see
  event/context/abolition-of-pec-1766). The Karlovci parallel line
  (1690-1920) is backlogged as a separate jurisdiction.
  jurisdiction_history and rank_history still to be added during
  verification.
