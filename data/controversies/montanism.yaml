id: controversy/montanism
label: Montanism (the New Prophecy)
description: >-
  The prophetic-rigorist movement of Montanus, Prisca, and Maximilla in Phrygia, self-styled the New Prophecy; opposed by Apollinaris of Hierapolis and the Asian synods, later attracting Tertullian.
variant_terms:
- term: New Prophecy
  note: >-
    the movement's self-designation - recorded per the naming rule
- term: Cataphrygian heresy
  note: >-
    the ancient heresiological label - recorded as a variant, not used for display
