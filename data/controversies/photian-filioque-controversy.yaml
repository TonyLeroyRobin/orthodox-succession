id: controversy/photian-filioque-controversy
label: Photian controversy and the Filioque
description: >-
  The ninth-century conflict over the see of Constantinople (Photius and Ignatius), papal jurisdiction, and the interpolation of the Filioque into the creed - the councils of 869-870 and 879-880 receiving opposite receptions East and West; the Filioque question runs on into the medieval debates.
