id: controversy/unionism
label: Unionism (Lyon and Florence)
description: >-
  The attempted reunions of the Chalcedonian East with Rome at Lyon II (1274) and Ferrara-Florence (1438-1439), their brief imperial enforcements, and their conciliar and popular repudiation in the East, Mark of Ephesus' refusal becoming the received Orthodox position.
