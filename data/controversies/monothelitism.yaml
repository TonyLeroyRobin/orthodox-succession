id: controversy/monothelitism
label: Monothelite controversy
description: >-
  The imperial attempt to unite Chalcedonians and non-Chalcedonians on one will and one energy in Christ, resisted by Sophronius of Jerusalem, Maximus the Confessor, and Martin I, and condemned at Constantinople III (680-681).
variant_terms:
- term: Monoenergism
  note: >-
    the one-energy phase under Sergius of Constantinople
