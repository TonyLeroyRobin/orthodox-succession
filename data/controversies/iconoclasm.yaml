id: controversy/iconoclasm
label: Iconoclasm
description: >-
  The Byzantine controversy over the veneration of images, in two phases (726-787 and 815-843), with Hieria (754) and Nicaea II (787) as the rival councils and the restoration of the icons in 843 as its liturgical close.
variant_terms:
- term: Iconomachy
  note: >-
    the Greek historiographical term
