id: controversy/calendar-controversy
label: Calendar controversy
description: >-
  The disputes over the church calendar, from the sixteenth-century Constantinople synods declining the Gregorian reform to the 1923 congress and the partial adoption of the Revised Julian calendar, which divided Chalcedonian jurisdictions and produced the Old Calendarist separations.
variant_terms:
- term: Old Calendarism
  note: >-
    the separated movements rejecting the 1923 reform
