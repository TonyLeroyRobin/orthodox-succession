id: controversy/pneumatomachian-controversy
label: Pneumatomachian controversy
description: >-
  The dispute over the divinity of the Holy Spirit ('Spirit-fighters'), answered by Athanasius' letters to Serapion and Basil's On the Holy Spirit and settled at Constantinople (381).
variant_terms:
