id: controversy/phyletism
label: Phyletism
description: >-
  The condemnation by the Constantinople council of 1872, occasioned by the Bulgarian exarchate question, of organizing the church along ethnic lines within the same territory; the underlying Bulgarian schism lasted until 1945.
