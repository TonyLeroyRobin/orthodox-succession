id: controversy/hesychast-controversy
label: Hesychast controversy
description: >-
  The fourteenth-century dispute over the hesychasts' experience of the divine light and the essence-energies distinction, between Gregory Palamas and Barlaam of Calabria (then Akindynos and Gregoras), settled for the Chalcedonian East by the Constantinople councils of 1341, 1347, and 1351.
