id: jurisdiction/uoc-kyiv-patriarchate
name: Ukrainian Orthodox Church – Kyiv Patriarchate
type: historical
autocephaly:
- granted_by: self-declared at the 1992 unification council of the Filaret faction and part
    of the UAOC
  date:
    value: '1992'
    calendar: gregorian
    precision: year
  recognition:
  - by: all
    status: not-recognized
    note: unrecognized by the canonical Orthodox churches throughout the body's existence;
      the 11 October 2018 act of the Ecumenical Patriarchate lifted the anathemas/irregularities
      and received the hierarchs, and the body merged into the OCU at the 15 December 2018
      unification council — recorded, not adjudicated
dissolved:
  date:
    value: '2018'
    calendar: gregorian
    precision: year
    note: the 15 December 2018 unification council
  successor: jurisdiction/orthodox-church-of-ukraine
primatial_see: see/ukraine/kyiv
sources:
- ref: source/orthodox-church-of-ukraine-official
  reliability: official-list
  note: the 2018 unification council's reception of both bodies is the OCU's own foundation
    narrative — pin during verification
- ref: source/wikipedia
  reliability: database
  note: draft citation — replace with sourced accounts during verification
status: unverified
notes: Modeled per the maintainer decision 2026-07-15. The patriarchal claim was to Kyiv —
  the primatial_see points at the shared see, its tenures carrying not-recognized qualifiers
  (the rule-6 structure). Filaret Denysenko's 2019 attempt to revive the body after his break
  with the OCU is recorded on his person record — it creates no successor implications here.
  The Moscow-jurisdiction metropolitans of Kyiv 1966-2014 (Filaret's canonical term, Volodymyr
  Sabodan) remain unmodeled — backlogged with the UOC eparchial history.
