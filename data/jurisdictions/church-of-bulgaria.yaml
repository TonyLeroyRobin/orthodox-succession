id: jurisdiction/church-of-bulgaria
name: Bulgarian Orthodox Church
type: autocephalous
autocephaly:
- granted_by: unilateral establishment of the Bulgarian Exarchate
  date:
    value: '1872'
    calendar: gregorian
    precision: year
  recognition:
  - by: jurisdiction/ecumenical-patriarchate
    status: not-recognized
    note: schism declared 1872, lifted 1945
- granted_by: jurisdiction/ecumenical-patriarchate
  date:
    value: '1945'
    calendar: gregorian
    precision: year
    note: schism lifted; autocephaly recognized; patriarchate restored 1953, recognized
      by Constantinople 1961
  recognition:
  - by: all
    status: recognized
primatial_see: see/bulgaria/sofia
sources:
