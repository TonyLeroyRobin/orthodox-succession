id: jurisdiction/uaoc
name: Ukrainian Autocephalous Orthodox Church (1990 revival)
type: historical
autocephaly:
- granted_by: self-declared; patriarchate proclaimed at the 1990 sobor (continuing the 1921/1942
    autocephalist movements, which are out of scope)
  date:
    value: '1990'
    calendar: gregorian
    precision: year
  recognition:
  - by: all
    status: not-recognized
    note: unrecognized by the canonical Orthodox churches throughout the body's existence;
      the 11 October 2018 act of the Ecumenical Patriarchate lifted the anathemas/irregularities
      and received the hierarchs, and the body merged into the OCU at the 15 December 2018
      unification council — recorded, not adjudicated
dissolved:
  date:
    value: '2018'
    calendar: gregorian
    precision: year
    note: the 15 December 2018 unification council
  successor: jurisdiction/orthodox-church-of-ukraine
primatial_see: see/ukraine/kyiv
sources:
- ref: source/orthodox-church-of-ukraine-official
  reliability: official-list
  note: the 2018 unification council's reception of both bodies is the OCU's own foundation
    narrative — pin during verification
- ref: source/wikipedia
  reliability: database
  note: draft citation — replace with sourced accounts during verification
status: unverified
notes: Modeled per the maintainer decision 2026-07-15. The 1921 and 1942 autocephalist formations
  are earlier bodies without surviving separate lineage into this database's scope rules —
  only the 1990 revival that merged into the OCU is modeled. The 1992 partial merger into
  the UOC-KP and the 1993 re-separation are carried on the tenure notes.
