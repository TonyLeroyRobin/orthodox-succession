id: jurisdiction/preslav-patriarchate
name: Patriarchate of Preslav (first Bulgarian patriarchate)
type: historical
autocephaly:
- granted_by: Council of Constantinople (870)
  date:
    value: 0870
    calendar: julian
    precision: year
    note: autonomous archbishopric under Constantinople
- granted_by: council under Simeon I of Bulgaria
  date:
    value: 0919
    calendar: julian
    precision: circa
    note: raised to a patriarchate 918/919; recognized by Constantinople in the peace of 927
dissolved:
  date:
    value: '1018'
    calendar: julian
    precision: year
    note: abolished by Basil II after the Byzantine annexation
  successor: jurisdiction/archbishopric-of-ohrid
primatial_see: see/bulgaria/preslav
