status: unverified
notes: 'Daughter metropolis of Constantinople from the baptism of Rus'' (988). Its
  1686 attachment to the Moscow Patriarchate is recorded as the dissolution of this
  historical jurisdiction; the canonical meaning of the 1686 letter is disputed
  between Constantinople and Moscow (2018) — recorded, not adjudicated. Successor
  lines: jurisdiction/church-of-russia (1686), jurisdiction/orthodox-church-of-ukraine
  (2019); the dissolved.successor field is left empty because naming either would
  adjudicate the dispute.'
