id: jurisdiction/tarnovo-patriarchate
name: Patriarchate of Tarnovo (second Bulgarian patriarchate)
type: historical
autocephaly:
- granted_by: restoration under the Asen dynasty
  date:
    value: '1186'
    calendar: julian
    precision: circa
    note: archbishopric of Tarnovo; in union with Rome 1204–1235
- granted_by: Council of Lampsacus (Ecumenical Patriarchate and the eastern patriarchs)
  date:
    value: '1235'
    calendar: julian
    precision: year
dissolved:
  date:
    value: '1393'
    calendar: julian
    precision: year
    note: Ottoman conquest of Tarnovo; Patriarch Evtimiy exiled
  successor: jurisdiction/ecumenical-patriarchate
primatial_see: see/bulgaria/tarnovo
sources:
