notes: >-
  The last great Antiochene exegete: deposed by Ephesus II (449), restored at Chalcedon after pronouncing the anathema on Nestorius; his writings against Cyril's Twelve Chapters were condemned in the Three Chapters affair (Constantinople II, 553) while his person was not - the participation records carry the sequence. Not glorified in the Byzantine calendars; no veneration block by assessment. Created in P3 tier iii (Nicene and Cappadocian era) 2026-07-15.
