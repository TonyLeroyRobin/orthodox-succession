notes: Apostle; co-founder of the Roman church with Paul. His Roman residence and
  martyrdom are early and universal tradition (1 Clement 5, Ignatius, Irenaeus,
  Eusebius); a 25-year Roman episcopate (42-67) is later tradition, recorded on
  the tenure with tradition grading. No consecration data exists for the apostolic
  era — absent, not inferred.
