notes: >-
  Bishop of Salamis/Constantia and metropolitan of Cyprus from c. 367 to
  403; celebrated heresiologist. Author of the Panarion and the Ancoratus
  (see work/panarion, work/ancoratus). No consecration record survives —
  absent, not inferred. Verification pass 2026-07-08: reference lists
  (official-derived and encyclopedic) give the accession as 368 where
  scholarship commonly gives 366/367 — the id keeps 0367 (also the KICKOFF
  convention example); resolve the year against Le Quien / a critical study
  during the scholarly pass. Cyprus audit 2026-07-11: veneration block added
  per DATA_COMPLETION §1 (opportunistic, persons touched by milestone work).
