notes: Bishop of Caesarea Maritima from c. 313 - the see has no record in the dataset yet, so no tenure is created (stated, not invented; the see is a BACKLOG candidate). Not glorified as a saint in the Chalcedonian churches - the literature notes his semi-Arian sympathies; no veneration block by assessment. Pulled forward into tier i (maintainer-approved) as author of the Historia Ecclesiastica, required for the Papias preserved_in chain. Created in P3 tier i (Apostolic Fathers) 2026-07-15.
