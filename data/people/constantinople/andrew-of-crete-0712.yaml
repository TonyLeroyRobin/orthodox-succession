notes: Monk of Mar Saba and the Anastasis, deacon of the Great Church, then
  archbishop of Gortyna in Crete - the Father the P2 Gortyna see record was created
  for; inventor (or great early master) of the canon as a hymnographic form. His
  brief lapse to monothelitism at the 712 pseudo-synod under Philippicus Bardanes
  and retraction is recorded in the sources - a council lead logged in
  docs/COUNCIL_LEADS.md. Created in P3 tier v addendum (the Gortyna promise) 2026-07-15.
