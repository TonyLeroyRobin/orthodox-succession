notes: Created in the Gorazd batch 2026-07-15. Bishop of the Czech religious communities under
  the Serbian jurisdiction (1921-1942); executed 4 September 1942 with his clergy for sheltering
  the Heydrich-assassination paratroopers in the crypt of Ss Cyril and Methodius cathedral.
  The pre-autocephaly anchor of Czech Orthodoxy - the autocephalous line begins with Jelevferij
  (1946).
