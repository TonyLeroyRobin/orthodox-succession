notes: The earliest named apologist (to Hadrian, c. 124-125). His identification with the
  Athenian bishop named by Dionysius of Corinth is traditional, not certain - the tenure
  record is marked disputed accordingly. The synaxarion commemoration of a Kodratos
  (Sept. 21) may conflate him with the apostle of the Seventy - no veneration block by
  assessment, flag for verification. Created in P3 tier ii (Apologists) 2026-07-15.
